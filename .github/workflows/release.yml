name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: news-cli-linux-x64
            target: bun-linux-x64
          - asset: news-cli-linux-arm64
            target: bun-linux-arm64
          - asset: news-cli-darwin-x64
            target: bun-darwin-x64
          - asset: news-cli-darwin-arm64
            target: bun-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Test
        run: bun test

      - name: Build binary
        run: bun build ./bin/news-cli.js --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.asset }}

      - name: Generate checksum
        run: sha256sum dist/${{ matrix.asset }} > dist/${{ matrix.asset }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/news-cli-*
            install.sh
            skills/news-cli/SKILL.md
